default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch('POSTGRES_HOST', 'localhost') %>
  port: <%= ENV.fetch('POSTGRES_PORT', '5432') %>
  pool: <%= ENV.fetch('RAILS_MAX_THREADS', 5) %>
  # frequency in seconds to periodically run the Reaper, which attempts
  # to find and recover connections from dead threads
  reaping_frequency: <%= ENV.fetch('DB_POOL_REAPING_FREQUENCY', 30) %>
  variables:
    # we are setting this value to be close to the racktimeout value. we will iterate and reduce this value going forward
    statement_timeout: <%= ENV["POSTGRES_STATEMENT_TIMEOUT"] || "14s" %>

development:
  <<: *default
  database: "<%= ENV.fetch('POSTGRES_DATABASE', 'daily_health_dev') %>"
  username: "<%= ENV.fetch('POSTGRES_USERNAME', 'postgres') %>"
  password: "<%= ENV.fetch('POSTGRES_PASSWORD', '') %>"

test:
  <<: *default
  database: "<%= ENV.fetch('POSTGRES_DATABASE', 'daily_health_test') %>"
  username: "<%= ENV.fetch('POSTGRES_USERNAME', 'postgres') %>"
  password: "<%= ENV.fetch('POSTGRES_PASSWORD', '') %>"

production:
  primary:
    <<: *default
    database: "<%= ENV.fetch('POSTGRES_DATABASE', 'daily_health_production') %>"
    username: "<%= ENV.fetch('POSTGRES_USERNAME', 'daily_health_prod') %>"
    password: "<%= ENV.fetch('POSTGRES_PASSWORD', 'daily_health_prod') %>"
  cache:
    <<: *default
    database: "<%= ENV.fetch('POSTGRES_DATABASE', 'daily_health_production') %>"
    username: "<%= ENV.fetch('POSTGRES_USERNAME', 'daily_health_prod') %>"
    password: "<%= ENV.fetch('POSTGRES_PASSWORD', 'daily_health_prod') %>"
    migrations_paths: db/cache_migrate
  cable:
    <<: *default
    database: "<%= ENV.fetch('POSTGRES_DATABASE', 'daily_health_production') %>"
    username: "<%= ENV.fetch('POSTGRES_USERNAME', 'daily_health_prod') %>"
    password: "<%= ENV.fetch('POSTGRES_PASSWORD', 'daily_health_prod') %>"
    migrations_paths: db/cable_migrate
  queue:
    <<: *default
    database: "<%= ENV.fetch('POSTGRES_DATABASE', 'daily_health_production') %>"
    username: "<%= ENV.fetch('POSTGRES_USERNAME', 'daily_health_prod') %>"
    password: "<%= ENV.fetch('POSTGRES_PASSWORD', 'daily_health_prod') %>"
    migrations_paths: db/queue_migrate
