pre-commit:
  parallel: true
  commands:
    rubocop:
      glob: '*.rb'
      run: bundle exec rubocop --autocorrect --force-exclusion {staged_files}
      stage_fixed: true
    lint-and-format:
      glob: '*.{js,ts,vue}'
      run: npx prettier --write {staged_files} && npx eslint --fix {staged_files}
      stage_fixed: true
    format-configs:
      glob: '*.{json,yml,yaml}'
      run: npx prettier --write {staged_files}
      stage_fixed: true
